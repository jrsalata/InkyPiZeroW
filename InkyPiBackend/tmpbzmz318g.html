<html>
    <head>
    <style>
        
        /* Basic Reset */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-smooth: never;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale; /* Alternative for macOS */
}

img {
    image-rendering: pixelated; /* Preserve sharp edges */
    image-rendering: crisp-edges;
    image-rendering: -webkit-optimize-contrast;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
}

.row-container {
    display: flex;
    flex-direction: column;
    height: 100%;
}

.column-container {
    display: flex;
    flex-direction: row;
    width: 100%;
}


/* Frame Styling */

.rectangle-frame {
    border: 0.7vw solid;
}

.top-bottom-frame {
    border-top: 0.7vw solid;
    border-bottom: 0.7vw solid;
}

.corner-frame {
    position:relative;
}
.corner-frame:before {
    display: block;
    content: &#34;&#34;;
    width: 10vw;
    height: 10vw;
    position: absolute;
    top: 0;
    left: 0;
    border-top: 0.7vw solid;
    border-left: 0.7vw solid;
  }
  
  .corner-frame:after {
    display: block;
    content: &#34;&#34;;
    width: 10vw;
    height: 10vw;
    position: absolute;
    bottom: 0;
    right: 0;
    border-bottom: 0.5vw solid;
    border-right: 0.5vw solid;
  }
        
        /* Basic Reset */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

.calendar {
  width: 100%;
  height: 100%;
  font-family: &#34;Jost&#34;;
  overflow: hidden;
}

.fc-toolbar.fc-header-toolbar {
  margin-bottom: 0px !important;
}

.fc .fc-daygrid-body-natural .fc-daygrid-day-events {
  margin-bottom: 0px !important;
  
}

.fc .fc-daygrid-day-number {
  padding-top: 0px !important;
  padding-bottom: 0px !important; 
}

.fc-widget-header{
  background-color:white;
}

.fc-dayGrid-view .fc-daygrid-day.fc-day-today .fc-daygrid-day-frame{
  border: 2px solid var(--fc-border-color) !important;
}

.fc-dayGridMonth-view .fc-daygrid-day.fc-day-today .fc-daygrid-day-frame{
  border: 2px solid var(--fc-border-color) !important;
}

.fc-timeGrid-view thead .fc-day.fc-day-today .fc-scrollgrid-sync-inner{
  border: 2px solid var(--fc-border-color) !important;
}

.fc-timeGridWeek-view thead .fc-col-header-cell.fc-day-today .fc-scrollgrid-sync-inner {
  border: 2px solid var(--fc-border-color) !important;
}

.fc .fc-timegrid-now-indicator-line {
  border-top-width: 3px !important;
}

.fc-scrollgrid {
  border-color: transparent !important;
}
.fc-scrollgrid td:last-of-type {
  border-right-color: transparent !important;
}

th {
  border-top-color: transparent;
  border-right-color: transparent !important;
  border-left-color: transparent !important;
}


.fc .fc-toolbar-title {
  font-size: var(--fc-title-font-size) !important;
}

.fc table {
  font-size: var(--fc-table-font-size) !important;
}
        
    </style>
