": false, "backgroundColor": "#007BFF", "end": "2026-07-07T10:00:00-04:00", "start": "2026-07-07T09:30:00-04:00", "textColor": "#ffffff", "title": "Busy"}, {"allDay": false, "backgroundColor": "#007BFF", "end": "2026-07-08T10:00:00-04:00", "start": "2026-07-08T09:30:00-04:00", "textColor": "#ffffff", "title": "Busy"}, {"allDay": false, "backgroundColor": "#007BFF", "end": "2026-07-09T10:00:00-04:00", "start": "2026-07-09T09:30:00-04:00", "textColor": "#ffffff", "title": "Busy"}, {"allDay": false, "backgroundColor": "#007BFF", "end": "2026-07-10T10:00:00-04:00", "start": "2026-07-10T09:30:00-04:00", "textColor": "#ffffff", "title": "Busy"}, {"allDay": false, "backgroundColor": "#007BFF", "end": "2026-07-09T15:00:00-04:00", "start": "2026-07-09T14:30:00-04:00", "textColor": "#ffffff", "title": "Busy"}, {"allDay": true, "backgroundColor": "#007BFF", "classNames": ["senior-dashboard-nothing-more"], "start": "2026-06-28T00:00:00-04:00", "textColor": "#ffffff", "title": "Nothing more for today."}], "labels": {"allDayText": "All day", "configMessage": "No calendar configured.", "dayAfterTomorrow": "Day after tomorrow", "errorMessage": "There was a problem updating.", "errorTitle": "Update failed", "noEventsContent": "Nothing scheduled!", "noRebootNote": "Persistent problem - please ask for help.", "nothingMoreToday": "Nothing more for today.", "offlineClock": "", "offlineMessage": "The device will restart automatically at", "offlineReassure": "Please wait a moment.", "offlineTitle": "No internet connection", "rebootPrefix": "Automatic restart at", "today": "Today", "tomorrow": "Tomorrow"}, "locale": "en", "time_format_12h": true, "timezone": "America/Indianapolis"}
</script>
<script>
    (function () {
        const configEl = document.getElementById('senior-dashboard-config');
        const config = configEl ? JSON.parse(configEl.textContent) : {};
        const calendarEvents = config.events || [];
        const locale = config.locale || 'en';
        const timezone = config.timezone || 'UTC';
        const currentDt = config.current_dt || '';
        const timeFormat12h = config.time_format_12h !== false;
        const labels = config.labels || {
            allDayText: 'All day',
            noEventsContent: 'Nothing scheduled!',
            today: 'Today',
            tomorrow: 'Tomorrow',
            dayAfterTomorrow: 'Day after tomorrow'
        };

        document.addEventListener('DOMContentLoaded', function () {
            const calendarEl = document.getElementById('calendar');
            const timeFormat = {
                hour: "numeric",
                minute: "2-digit",
                omitZeroMinute: timeFormat12h,
                hour12: timeFormat12h,
                meridiem: 'short'
            };

            const currentDate = new Date(currentDt);
            const dateFormatter = new Intl.DateTimeFormat(locale, {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                timeZone: timezone
            });
            const formattedTitle = dateFormatter.format(currentDate);

            // Calculate the 3-day range for display
            const startDate = new Date(currentDt);
            const endDate = new Date(currentDt);
            endDate.setDate(endDate.getDate() + 3);

            console.log('Current date:', currentDt);
            console.log('Total events from backend:', calendarEvents.length);
            console.log('Events:', calendarEvents);

            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'list',
                views: {
                    list: {
                        duration: { days: 3 }
                    }
                },
                events: calendarEvents,
                now: currentDt,
                initialDate: currentDt,
                validRange: {
                    start: startDate,
                    end: endDate
                },
                timeZone: timezone,
                contentHeight: '100%',
                expandRows: true,
                locale: locale,
                allDayText: labels.allDayText,
                noEventsContent: labels.noEventsContent,
                eventTimeFormat: timeFormat,
                displayEventTime: true,
                weekends: true,
                fixedWeekCount: false,
                headerToolbar: {
                    left: '',
                    center: '',
                    right: ''
                },
                eventDidMount: function (arg) {
                    if (arg.el.classList.contains('senior-dashboard-nothing-more')) {
                        const timeEl = arg.el.querySelector('.fc-list-event-time');
                        const titleEl = arg.el.querySelector('.fc-list-event-title');
                        if (timeEl) {
                            timeEl.style.visibility = 'hidden';
                        }
                        if (titleEl) {
                            titleEl.textContent = arg.event.title || '';
                        }
                    }
                },
                datesSet: function () {
                    const dashboardTitleEl = document.getElementById('dashboard-title');
                    if (dashboardTitleEl) {
                        dashboardTitleEl.textContent = formattedTitle;
                    }
                    // Set list day headers to "Heute: Sonntag 1. Februar 2026" (same format as title: weekday, month, day, year)
                    const dayLabels = [labels.today, labels.tomorrow, labels.dayAfterTomorrow];
                    const dayDates = [
                        currentDate,
                        (function () { const d = new Date(currentDt); d.setDate(d.getDate() + 1); return d; })(),
                        (function () { const d = new Date(currentDt); d.setDate(d.getDate() + 2); return d; })()
                    ];
                    requestAnimationFrame(function () {
                        const listDays = calendarEl.querySelectorAll('.fc-list-day');
                        listDays.forEach(function (dayEl, i) {
                            const label = dayLabels[i];
                            const dayDate = dayDates[i];
                            if (!label || !dayDate) return;
                            const formatted = dateFormatter.format(dayDate);
                            const text = label + ': ' + formatted;
                            const textEl = dayEl.querySelector('.fc-list-day-text') || dayEl.querySelector('.fc-list-day-cushion');
                            const sideEl = dayEl.querySelector('.fc-list-day-side-text');
                            if (textEl) textEl.textContent = text;
                            if (sideEl) sideEl.textContent = text;
                        });
                    });
                }
            });
            calendar.render();

            const dashboardTitleEl = document.getElementById('dashboard-title');
            if (dashboardTitleEl) {
                dashboardTitleEl.textContent = formattedTitle;
            }
        });
    })();
</script>
